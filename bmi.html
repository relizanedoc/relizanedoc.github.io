<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة مؤشر كتلة الجسم (BMI)-دليل أطباء غليزان</title>
    <link rel="stylesheet" href="ranges.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg-card: rgba(255, 255, 255, 0.95);
            --glass-border: rgba(255, 255, 255, 0.2);
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --accent-pink: #ec4899;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: var(--text-primary);
            line-height: 1.6;
        }

        .bmi-page {
            min-height: 100vh;
            padding: 120px 20px 60px;
        }

        .bmi-container {
            max-width: 800px;
            margin: 0 auto;
        }

        .bmi-card {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 50px 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        .bmi-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple), var(--accent-pink));
        }

        .bmi-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .bmi-header i {
            font-size: 3rem;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
        }

        .bmi-header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 10px;
        }

        .bmi-header p {
            color: var(--text-secondary);
            font-size: 1.1rem;
        }

        .bmi-form {
            display: grid;
            gap: 25px;
            margin-bottom: 30px;
        }

        .form-group {
            position: relative;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-primary);
            font-size: 1rem;
        }

        .form-group label i {
            margin-left: 8px;
            color: var(--accent-blue);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .form-group input {
            width: 100%;
            padding: 15px 20px;
            padding-left: 80px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1.1rem;
            font-family: 'Tajawal', sans-serif;
            transition: all 0.3s ease;
            background: white;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .input-unit {
            position: absolute;
            left: 20px;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.95rem;
        }

        .bmi-button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Tajawal', sans-serif;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        .bmi-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.4);
        }

        .bmi-button:active {
            transform: translateY(0);
        }

        .bmi-result {
            margin-top: 40px;
            padding: 30px;
            border-radius: 16px;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            border: 2px solid #bae6fd;
            display: none;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .bmi-result.show {
            display: block;
        }

        .result-header {
            text-align: center;
            margin-bottom: 25px;
        }

        .bmi-value {
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .bmi-category {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            padding: 10px 20px;
            border-radius: 25px;
            display: inline-block;
        }

        .category-underweight {
            background: #dbeafe;
            color: #1e40af;
        }

        .category-normal {
            background: #d1fae5;
            color: #065f46;
        }

        .category-overweight {
            background: #fef3c7;
            color: #92400e;
        }

        .category-obese {
            background: #fee2e2;
            color: #991b1b;
        }

        .bmi-ranges {
            margin-top: 25px;
            padding-top: 25px;
            border-top: 2px solid rgba(0, 0, 0, 0.1);
        }

        .range-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .range-item:last-child {
            border-bottom: none;
        }

        .range-label {
            font-weight: 600;
            color: var(--text-primary);
        }

        .range-value {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .bmi-tips {
            margin-top: 25px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 12px;
            border-right: 4px solid var(--accent-blue);
        }

        .bmi-tips h3 {
            color: var(--accent-blue);
            margin-bottom: 10px;
            font-size: 1.2rem;
        }

        .bmi-tips ul {
            list-style: none;
            padding-right: 0;
        }

        .bmi-tips li {
            padding: 8px 0;
            padding-right: 25px;
            position: relative;
            color: var(--text-secondary);
        }

        .bmi-tips li::before {
            content: '\f00c';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            position: absolute;
            right: 0;
            color: var(--success);
        }

        .error-message {
            background: #fee2e2;
            color: #991b1b;
            padding: 15px;
            border-radius: 12px;
            border-right: 4px solid var(--danger);
            margin-top: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        @media (max-width: 768px) {
            .bmi-page {
                padding: 80px 15px 40px;
            }

            .bmi-card {
                padding: 30px 20px;
            }

            .bmi-header h1 {
                font-size: 2rem;
            }

            .bmi-value {
                font-size: 2.5rem;
            }

            .form-group input {
                font-size: 1rem;
                padding: 12px 15px;
                padding-left: 70px;
            }
        }
    </style>
</head>
<body>
    <div class="bmi-page">
        <div class="bmi-container">
            <div class="bmi-card">
                <div class="bmi-header">
                    <i class="fas fa-weight-scale"></i>
                    <h1>حاسبة مؤشر كتلة الجسم</h1>
                    <p>احسب مؤشر كتلة جسمك لمعرفة ما إذا كان وزنك مثاليًا</p>
                </div>

                <form class="bmi-form" id="bmiForm">
                    <div class="form-group">
                        <label for="weight">
                            <i class="fas fa-weight-hanging"></i>
                            الوزن
                        </label>
                        <div class="input-wrapper">
                            <input 
                                type="number" 
                                id="weight" 
                                name="weight" 
                                placeholder="أدخل وزنك"
                                min="20"
                                max="300"
                                step="0.1"
                                required
                            >
                            <span class="input-unit">كجم</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="height">
                            <i class="fas fa-ruler-vertical"></i>
                            الطول
                        </label>
                        <div class="input-wrapper">
                            <input 
                                type="number" 
                                id="height" 
                                name="height" 
                                placeholder="أدخل طولك"
                                min="50"
                                max="250"
                                step="0.1"
                                required
                            >
                            <span class="input-unit">سم</span>
                        </div>
                    </div>

                    <button type="submit" class="bmi-button">
                        <i class="fas fa-calculator"></i>
                        احسب مؤشر كتلة الجسم
                    </button>
                </form>

                <div class="error-message" id="errorMessage">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span id="errorText">يرجى إدخال قيم صحيحة</span>
                </div>

                <div class="bmi-result" id="bmiResult">
                    <div class="result-header">
                        <div class="bmi-value" id="bmiValue">0.0</div>
                        <div class="bmi-category" id="bmiCategory">-</div>
                    </div>

                    <div class="bmi-ranges">
                        <div class="range-item">
                            <span class="range-label">نقص في الوزن</span>
                            <span class="range-value">أقل من 18.5</span>
                        </div>
                        <div class="range-item">
                            <span class="range-label">وزن طبيعي</span>
                            <span class="range-value">18.5 - 24.9</span>
                        </div>
                        <div class="range-item">
                            <span class="range-label">زيادة في الوزن</span>
                            <span class="range-value">25.0 - 29.9</span>
                        </div>
                        <div class="range-item">
                            <span class="range-label">سمنة</span>
                            <span class="range-value">30.0 أو أكثر</span>
                        </div>
                    </div>

                    <div class="bmi-tips" id="bmiTips">
                        <h3><i class="fas fa-lightbulb"></i> نصائح صحية</h3>
                        <ul id="tipsList"></ul>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('bmiForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const weight = parseFloat(document.getElementById('weight').value);
            const height = parseFloat(document.getElementById('height').value);
            const errorMessage = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            const resultDiv = document.getElementById('bmiResult');
            
            // إخفاء الرسائل السابقة
            errorMessage.classList.remove('show');
            resultDiv.classList.remove('show');
            
            // التحقق من صحة المدخلات
            if (isNaN(weight) || isNaN(height) || weight <= 0 || height <= 0) {
                errorText.textContent = 'يرجى إدخال قيم صحيحة للوزن والطول';
                errorMessage.classList.add('show');
                return;
            }
            
            if (weight < 20 || weight > 300) {
                errorText.textContent = 'يرجى إدخال وزن بين 20 و 300 كجم';
                errorMessage.classList.add('show');
                return;
            }
            
            if (height < 50 || height > 250) {
                errorText.textContent = 'يرجى إدخال طول بين 50 و 250 سم';
                errorMessage.classList.add('show');
                return;
            }
            
            // حساب مؤشر كتلة الجسم
            const heightInMeters = height / 100;
            const bmi = weight / (heightInMeters * heightInMeters);
            const bmiRounded = bmi.toFixed(1);
            
            // تحديد الفئة
            let category = '';
            let categoryClass = '';
            let tips = [];
            
            if (bmi < 18.5) {
                category = 'نقص في الوزن';
                categoryClass = 'category-underweight';
                tips = [
                    'تناول وجبات غنية بالسعرات الحرارية الصحية',
                    'زيادة عدد الوجبات إلى 5-6 وجبات صغيرة يومياً',
                    'ممارسة تمارين بناء العضلات',
                    'استشارة أخصائي تغذية'
                ];
            } else if (bmi >= 18.5 && bmi < 25) {
                category = 'وزن طبيعي';
                categoryClass = 'category-normal';
                tips = [
                    'الحفاظ على نظام غذائي متوازن',
                    'ممارسة الرياضة بانتظام (30 دقيقة يومياً)',
                    'شرب كمية كافية من الماء (8 أكواب يومياً)',
                    'النوم لمدة 7-8 ساعات يومياً'
                ];
            } else if (bmi >= 25 && bmi < 30) {
                category = 'زيادة في الوزن';
                categoryClass = 'category-overweight';
                tips = [
                    'تقليل تناول السكريات والدهون المشبعة',
                    'زيادة النشاط البدني تدريجياً',
                    'تناول المزيد من الخضروات والفواكه',
                    'مراقبة حجم الحصص الغذائية'
                ];
            } else {
                category = 'سمنة';
                categoryClass = 'category-obese';
                tips = [
                    'استشارة طبيب أو أخصائي تغذية فوراً',
                    'بدء برنامج رياضي تدريجي',
                    'تغيير عادات الأكل الصحية',
                    'مراقبة السعرات الحرارية المستهلكة',
                    'النظر في الانضمام لبرنامج دعم'
                ];
            }
            
            // عرض النتائج
            document.getElementById('bmiValue').textContent = bmiRounded;
            const categoryDiv = document.getElementById('bmiCategory');
            categoryDiv.textContent = category;
            categoryDiv.className = 'bmi-category ' + categoryClass;
            
            // عرض النصائح
            const tipsList = document.getElementById('tipsList');
            tipsList.innerHTML = '';
            tips.forEach(tip => {
                const li = document.createElement('li');
                li.textContent = tip;
                tipsList.appendChild(li);
            });
            
            // إظهار النتيجة
            resultDiv.classList.add('show');
            
            // التمرير إلى النتيجة
            resultDiv.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        });
        
        // إعادة تعيين النموذج عند الضغط على Enter
        document.getElementById('weight').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('height').focus();
            }
        });
    </script>
</body>
</html>
