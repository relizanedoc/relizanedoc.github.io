name: Update Doctors Meta File

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  generate-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24' # تم التحديث إلى الإصدار 24 لتجنب التحذير الأصفر

    - name: Generate JSON Meta File
      env:
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      # تم تغيير مسار التشغيل هنا ليطابق المجلد الجديد الخاص بك (cript)
      run: node scripts/generate-meta.js

    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add doctors-meta.json
        git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto-update doctors-meta.json" && git push)
