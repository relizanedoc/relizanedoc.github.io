<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة الإدارة العليا - Relizane Medical</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background: var(--bg); padding: 2rem 1rem;">

  <div class='card' style='max-width: 1000px; margin: 0 auto; display: none;' id="adminMainContainer">
    
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <h2 class='text-xl font-bold' style="color: var(--danger); margin: 0;">لوحة الإدارة العليا</h2>
        <a href="index.html" class="btn btn-secondary btn-sm" style="text-decoration: none;">العودة للموقع</a>
    </div>
    
    <div class="booking-tabs mb-4">
        <div class="booking-tab active" id="tabAdminReviews" onclick="document.getElementById('adminReviewsSec').classList.remove('hidden'); document.getElementById('adminDocsSec').classList.add('hidden'); this.classList.add('active'); document.getElementById('tabAdminDocs').classList.remove('active');">
            <h3 class="tab-title" style="margin: 0; font-size: 1rem;">التقييمات المعلقة</h3>
        </div>
        <div class="booking-tab" id="tabAdminDocs" onclick="document.getElementById('adminDocsSec').classList.remove('hidden'); document.getElementById('adminReviewsSec').classList.add('hidden'); this.classList.add('active'); document.getElementById('tabAdminReviews').classList.remove('active');">
            <h3 class="tab-title" style="margin: 0; font-size: 1rem;">إدارة الأطباء</h3>
        </div>
    </div>

    <div id="adminReviewsSec">
        <div id="pendingReviewsContainer" style="display: flex; flex-direction: column; gap: 1rem;">
            <div class="text-center text-gray p-4">جاري تحميل البيانات...</div>
        </div>
    </div>

    <div id="adminDocsSec" class="hidden">
        <div class="table-container">
            <table style="width: 100%; text-align: right; border-collapse: collapse;">
                <thead>
                    <tr style="border-bottom: 2px solid var(--border); background: var(--bg);">
                        <th style="padding: 1rem;">اسم الطبيب</th>
                        <th style="padding: 1rem;">التخصص</th>
                        <th style="padding: 1rem;">رقم الهاتف</th>
                        <th style="padding: 1rem;">إجراءات</th>
                    </tr>
                </thead>
                <tbody id="adminDoctorsTbody"></tbody>
            </table>
        </div>
    </div>
  </div>

  <div id='toastContainer'></div>

  <div id="editDoctorModal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; z-index: 9999; padding: 1rem;">
      <div class="card" style="width: 100%; max-width: 400px; background: var(--bg); padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
          <h3 style="margin-top: 0; margin-bottom: 1.5rem; color: var(--primary-dark);">تعديل بيانات الطبيب</h3>
          
          <input type="hidden" id="editDocId">
          
          <div style="margin-bottom: 1rem;">
              <label style="display: block; margin-bottom: 0.5rem; font-weight: bold; font-size: 0.9rem;">رقم الهاتف:</label>
              <input type="text" id="editDocPhone" style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 8px;" dir="ltr">
          </div>
          
          <div style="margin-bottom: 1.5rem;">
              <label style="display: block; margin-bottom: 0.5rem; font-weight: bold; font-size: 0.9rem;">كلمة المرور الجديدة:</label>
              <input type="text" id="editDocPassword" placeholder="اتركها فارغة إذا لم ترد التغيير" style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 8px;" dir="ltr">
          </div>
          
          <div style="display: flex; gap: 0.75rem;">
              <button class="btn btn-primary" onclick="window.saveDoctorData()" style="flex: 1;">حفظ التعديلات</button>
              <button class="btn btn-secondary" onclick="document.getElementById('editDoctorModal').style.display='none'" style="flex: 1;">إلغاء</button>
          </div>
      </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/dist/bcrypt.min.js"></script>
  <script>
    const ADMIN_EMAIL = "sisi.sou27@gmail.com"; 
    const SUPABASE_URL = 'https://iirjtmobphgmkgwkwumc.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlpcmp0bW9icGhnbWtnd2t3dW1jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5NDA2NjYsImV4cCI6MjA5NjUxNjY2Nn0.Yfa0oEwp_id9tHpSb3h0jf__B4drqXsM-TVs4VTTmp4';

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    window.showAdminToast = function(message, type = 'success') {
        const container = document.getElementById('toastContainer');
        if (!container) return;
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.textContent = message;
        container.appendChild(toast);
        setTimeout(() => {
            toast.style.animation = 'fadeOutDown 0.3s forwards';
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    };

    async function checkSecurity() {
        try {
            const { data: authData, error: authError } = await supabaseClient.auth.getUser();
            let user = authData?.user;

            if (authError || !user) {
                const { data: sessionData } = await supabaseClient.auth.getSession();
                user = sessionData?.session?.user;
            }
            
            if (!user || user.email !== ADMIN_EMAIL) {
                window.showAdminToast("عذراً، غير مصرح لك بدخول هذه الصفحة.", "error");
                setTimeout(() => window.location.replace("index.html"), 1500);
            } else {
                document.getElementById('adminMainContainer').style.display = 'block';
                window.loadAdminDashboard();
                window.loadAdminDoctors();
            }
        } catch (error) {
            console.error("Auth Error:", error);
            window.showAdminToast("خطأ في الاتصال.. جاري إعادة المحاولة تلقائياً", "error");
            setTimeout(checkSecurity, 1500);
        }
    }

    window.loadAdminDashboard = async function() {
        const container = document.getElementById('pendingReviewsContainer');
        try {
            const { data: reviews, error } = await supabaseClient
                .from('reviews')
                .select('id, rating, comment, patient_name, doctors(first_name, last_name, first_name_en, last_name_en)')
                .eq('status', 'pending')
                .order('created_at', { ascending: false });

            if (error) throw error;
            if (!reviews || reviews.length === 0) {
                container.innerHTML = `<div class="empty-state" style="padding: 2rem; text-align: center; border: 1px dashed var(--border); border-radius: 8px;">✅ لا توجد تقييمات معلقة للمراجعة.</div>`;
                return;
            }

            let html = '';
            reviews.forEach(r => {
                const doc = r.doctors;
                const doctorName = doc ? `${doc.first_name} ${doc.last_name}` : 'طبيب محذوف';
                html += `
                <div class="review-card" id="admin-review-${r.id}" style="border-right: 4px solid var(--warning); padding: 1rem; background: var(--bg); border: 1px solid var(--border); border-radius: 8px;">
                    <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 1rem;">
                        <div style="flex: 1;">
                            <div style="margin-bottom: 0.5rem; font-size: 0.9rem;">
                                <span style="color: var(--text-secondary);">المريض:</span> <strong>${r.patient_name || 'مجهول'}</strong> <br>
                                <span style="color: var(--text-secondary);">الطبيب:</span> <strong style="color: var(--primary-dark);">د. ${doctorName}</strong>
                            </div>
                            <div style="color: #f59e0b; font-size: 1.1rem; letter-spacing: 2px;">${'★'.repeat(r.rating)}<span style="color:#e2e8f0">${'★'.repeat(5 - r.rating)}</span></div>
                            <p class="mt-2 text-sm" style="background: white; padding: 0.75rem; border-radius: 8px; border: 1px solid var(--border);">${r.comment}</p>
                        </div>
                        <div style="display: flex; gap: 0.5rem; flex-direction: column;">
                            <button class="btn btn-success btn-sm" onclick="window.updateReviewStatus('${r.id}', 'published')">موافقة ونشر ✔️</button>
                            <button class="btn btn-secondary btn-sm" style="color: var(--danger); border-color: var(--danger);" onclick="window.updateReviewStatus('${r.id}', 'deleted')">رفض وحذف ❌</button>
                        </div>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        } catch (err) {
            container.innerHTML = `<div class="text-danger p-4 text-center">خطأ: ${err.message}</div>`;
        }
    };

    window.updateReviewStatus = async function(reviewId, newStatus) {
        if (!confirm('هل أنت متأكد من هذا الإجراء؟')) return;
        try {
            const { error } = await supabaseClient.from('reviews').update({ status: newStatus }).eq('id', reviewId);
            if (error) throw error;
            window.showAdminToast('تم التنفيذ بنجاح', 'success');
            const el = document.getElementById(`admin-review-${reviewId}`);
            if (el) {
                el.style.opacity = '0';
                el.style.transform = 'scale(0.95)';
                el.style.transition = 'all 0.3s ease';
                setTimeout(() => el.remove(), 300);
            }
        } catch (err) {
            window.showAdminToast('خطأ: ' + err.message, 'error');
        }
    };

    window.loadAdminDoctors = async function() {
        const tbody = document.getElementById('adminDoctorsTbody');
        try {
            const { data: doctors, error } = await supabaseClient
                .from('doctors')
                .select('id, first_name, last_name, specialty, phone')
                .order('created_at', { ascending: false });

            if (error) throw error;
            if (!doctors || doctors.length === 0) {
                tbody.innerHTML = '<tr><td colspan="4" class="text-center p-4">لا يوجد أطباء مسجلين.</td></tr>';
                return;
            }

            let html = '';
            doctors.forEach(doc => {
                const name = `${doc.first_name} ${doc.last_name}`;
                const phone = doc.phone || '';
                
                html += `
                <tr style="border-bottom: 1px solid var(--border);">
                    <td style="padding: 1rem;"><strong>د. ${name}</strong></td>
                    <td style="padding: 1rem; color: var(--text-secondary);">${doc.specialty || '-'}</td>
                    <td style="padding: 1rem;" dir="ltr">${phone || 'لا يوجد'}</td>
                    <td style="padding: 1rem;">
                        <button class="btn btn-primary btn-sm" onclick="window.openEditModal('${doc.id}', '${phone}')" style="padding: 0.4rem 0.8rem; background: var(--primary-dark);">
                            تعديل البيانات ✏️
                        </button>
                    </td>
                </tr>`;
            });
            tbody.innerHTML = html;
        } catch (err) {
            tbody.innerHTML = `<tr><td colspan="4" class="text-danger text-center p-4">خطأ: ${err.message}</td></tr>`;
        }
    };

    window.openEditModal = function(id, currentPhone) {
        document.getElementById('editDocId').value = id;
        document.getElementById('editDocPhone').value = currentPhone;
        document.getElementById('editDocPassword').value = ''; 
        document.getElementById('editDoctorModal').style.display = 'flex';
    };

    // 🌟 حفظ البيانات مع التشفير باستخدام BcryptJS
   window.saveDoctorData = async function() {
        const id = document.getElementById('editDocId').value;
        const newPhone = document.getElementById('editDocPhone').value.trim();
        const rawPassword = document.getElementById('editDocPassword').value.trim();

        // 1. التحقق من تحميل مكتبة bcrypt
        if (typeof bcrypt === 'undefined') {
            window.showAdminToast('خطأ: مكتبة التشفير لم تُحمل بعد، يرجى تحديث الصفحة.', 'error');
            return;
        }

        if (newPhone === '') {
            window.showAdminToast('رقم الهاتف مطلوب!', 'error');
            return;
        }

        let updatePayload = { phone: newPhone };

        if (rawPassword !== '') {
            try {
                // استخدام دالة التشفير بشكل آمن
                const saltRounds = 10;
                const hashedPassword = bcrypt.hashSync(rawPassword, saltRounds);
                updatePayload.password = hashedPassword; 
            } catch (err) {
                console.error("Hashing Error details:", err);
                window.showAdminToast('فشل في عملية التشفير: ' + err.message, 'error');
                return;
            }
        }

        try {
            const { error } = await supabaseClient
                .from('doctors')
                .update(updatePayload)
                .eq('id', id);

            if (error) throw error;
            
            window.showAdminToast('تم تحديث بيانات الطبيب بنجاح!', 'success');
            document.getElementById('editDoctorModal').style.display = 'none'; 
            window.loadAdminDoctors();
            
        } catch (err) {
            window.showAdminToast('خطأ في الاتصال بقاعدة البيانات: ' + err.message, 'error');
        }
    };

    checkSecurity();
  </script>
</body>
</html>
