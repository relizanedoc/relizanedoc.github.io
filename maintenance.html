<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دليل أطباء غليزان | تحت الصيانة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f8fafc; /* نفس لون خلفية موقعك */
            color: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .maintenance-container {
            background: white;
            padding: 3rem 2rem;
            border-radius: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 500px;
            width: 90%;
            border: 1px solid #e2e8f0;
        }
        .icon-wrapper {
            color: #0ea5e9; /* اللون الأزرق الخاص بموقعك */
            width: 90px;
            height: 90px;
            margin: 0 auto 1.5rem auto;
            background: rgba(14, 165, 233, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 900;
            margin-bottom: 1rem;
            color: #0f172a;
        }
        p {
            color: #64748b;
            line-height: 1.7;
            margin-bottom: 2rem;
            font-size: 1.05rem;
        }
        /* تصميم دائرة التحميل */
        .loader {
            border: 4px solid #f1f5f9;
            border-top: 4px solid #0ea5e9;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="maintenance-container">
        <div class="icon-wrapper">
            <svg width="45" height="45" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path>
            </svg>
        </div>
        
        <h1>الموقع تحت الصيانة والتحديث</h1>
        <p>نحن نقوم حالياً بتحديث البنية التحتية لمنصة <strong>دليل أطباء غليزان</strong> وإضافة ميزات جديدة لتحسين تجربتكم. سنعود للعمل في أقرب وقت ممكن!</p>
        
        <div class="loader"></div>
    </div>

</body>
</html>
