<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بنك التبرع بالدم - غليزان</title>
    <link rel="stylesheet" href="blood.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <!-- استدعاء مكتبة Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header class="navbar">
        <div class="container">
            <h1 class="logo">🩸 بنك التبرع بالدم- غليزان</h1>
            <nav>
                <a href="index.html" class="active">تسجيل متبرع</a>
                <a href="search.html">البحث عن متبرع</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="form-section">
            <h2>استمارة تسجيل متبرع بالدم</h2>
            <p>المعلومات الأساسية محددة بعلامة <span class="required">*</span></p>
            
            <form id="addDonorForm">
                <div class="form-grid">
                    <!-- البيانات الأساسية -->
                    <div class="form-group">
                        <label>الاسم الكامل <span class="required">*</span></label>
                        <input type="text" id="name" required placeholder="أدخل اسمك الكامل">
                    </div>
                    <div class="form-group">
                        <label>البلدية <span class="required">*</span></label>
                        <select id="municipality" required>
    <option value="">اختر البلدية</option>
    <!-- تم ترتيب البلديات أبجدياً لتجربة مستخدم (UX) أفضل -->
    <option value="أولاد سيدي الميهوب">أولاد سيدي الميهوب</option>
    <option value="الحاسي">الحاسي</option>
    <option value="الحمادنة">الحمادنة</option>
    <option value="الرمكة">الرمكة</option>
    <option value="القطار">القطار</option>
    <option value="القلعة">القلعة</option>
    <option value="المطمر">المطمر</option>
    <option value="الولجة">الولجة</option>
    <option value="بلعسل بوزقزة">بلعسل بوزقزة</option>
    <option value="بن داود">بن داود</option>
    <option value="بني درقن">بني درقن</option>
    <option value="بني زنطيس">بني زنطيس</option>
    <option value="جديوية">جديوية</option>
    <option value="حد الشكالة">حد الشكالة</option>
    <option value="حمري">حمري</option>
    <option value="دار بن عبد الله">دار بن عبد الله</option>
    <option value="زمورة">زمورة</option>
    <option value="سيدي امحمد بن علي">سيدي امحمد بن علي</option>
    <option value="سيدي امحمد بن عودة">سيدي امحمد بن عودة</option>
    <option value="سيدي خطاب">سيدي خطاب</option>
    <option value="سيدي سعادة">سيدي سعادة</option>
    <option value="سيدي لزرق">سيدي لزرق</option>
    <option value="سوق الحد">سوق الحد</option>
    <option value="عمي موسى">عمي موسى</option>
    <option value="عين الرحمة">عين الرحمة</option>
    <option value="عين طارق">عين طارق</option>
    <option value="غليزان">غليزان</option>
    <option value="لحلاف">لحلاف</option>
    <option value="مازونة">مازونة</option>
    <option value="مديونة">مديونة</option>
    <option value="مرجة سيدي عابد">مرجة سيدي عابد</option>
    <option value="منداس">منداس</option>
    <option value="وادي ارهيو">وادي ارهيو</option>
    <option value="وادي الجمعة">وادي الجمعة</option>
    <option value="وادي السلام">وادي السلام</option>
    <option value="واريزان">واريزان</option>
    <option value="يلل">يلل</option>
</select>
                    </div>
                    <div class="form-group">
                        <label>زمرة الدم <span class="required">*</span></label>
                        <select id="blood_type" required>
                            <option value="">اختر زمرة الدم</option>
                            <option value="A+">A+</option>
                            <option value="A-">A-</option>
                            <option value="B+">B+</option>
                            <option value="B-">B-</option>
                            <option value="AB+">AB+</option>
                            <option value="AB-">AB-</option>
                            <option value="O+">O+</option>
                            <option value="O-">O-</option>
                        </select>
                    </div>

                    <!-- البيانات الاختيارية -->
                    <div class="form-group">
                        <label>العمر</label>
                        <input type="number" id="age" placeholder="مثال: 25">
                    </div>
                    <div class="form-group">
                        <label>الجنس</label>
                        <select id="gender">
                            <option value="">اختر الجنس</option>
                            <option value="ذكر">ذكر</option>
                            <option value="أنثى">أنثى</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>رقم الهاتف الأول</label>
                        <input type="tel" id="phone1" placeholder="05XX XX XX XX">
                    </div>
                    <div class="form-group">
                        <label>رقم الهاتف الثاني</label>
                        <input type="tel" id="phone2" placeholder="07XX XX XX XX">
                    </div>
                    <div class="form-group">
                        <label>البريد الإلكتروني</label>
                        <input type="email" id="email" placeholder="example@email.com">
                    </div>
                    <div class="form-group">
                        <label>تاريخ آخر تبرع بالدم</label>
                        <input type="date" id="last_donation">
                    </div>
                </div>
                
                <button type="submit" class="btn-submit" id="submitBtn">تسجيل كمتبرع</button>
                <div id="formMessage" class="message"></div>
            </form>
        </section>
    </main>

    <script src="blood.js"></script>
</body>
</html>
