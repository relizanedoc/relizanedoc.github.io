<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <title>د. عبد الحق ملاح | أمراض الجهاز الهضمي - Gastroenterology</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="د. عبد الحق ملاح | دليل أطباء غليزان">
    <meta property="og:description" content="أخصائي أمراض الجهاز الهضمي - Gastroenterology في غليزان. احجز موعدك الآن عبر الإنترنت.">
    <meta property="og:image" content="https://relizane.org/images/social-preview.jpg">
    <meta property="og:url" content="https://relizane.org/doctors/dr-abd-alhk-mlah.html">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #f8fafc; font-family: 'Tajawal', sans-serif; }
        /* شاشة التحميل الاحترافية التي تغطي الموقع */
        #loader { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #f8fafc; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.5s ease; }
        .spinner { width: 45px; height: 45px; border: 4px solid #e2e8f0; border-top-color: #0ea5e9; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loader">
        <div class="spinner"></div>
        <h3 style="color: #334155; margin: 0;">جاري تجهيز صفحة الطبيب...</h3>
    </div>

    <iframe id="main-site" src="https://relizane.org/?doc=5cba80c3-a84e-427a-ba12-131ff84ddfd1" style="width: 100vw; height: 100vh; border: none; display: block;"></iframe>

    <script>
        document.getElementById('main-site').onload = function() {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }, 800); // تأخير بسيط جداً لضمان اكتمال فتح نافذة الطبيب في موقعك
        };
    </script>
</body>
</html>
