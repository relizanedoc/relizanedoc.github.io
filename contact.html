 <!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="contactPageTitle">Contact Us - Relizane Medical Directory</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="app-container" style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
    <div style="width: 100%; max-width: 600px;">
      
      <div class="card card-hover">
        <div class="text-center mb-6">
          <h1 class="font-bold text-xl mb-2" style="color: var(--primary);" data-i18n="contactTitle">Contact Us</h1>
          <p class="text-gray text-sm" data-i18n="contactDesc">We'd love to hear from you. Please fill out the form below and your message will be saved immediately.</p>
        </div>

        <form id="contactForm">
          
          <div class="form-group">
            <label for="name" data-i18n="formName">Full Name</label>
            <input type="text" id="name" required placeholder="Enter your full name" data-i18n-placeholder="namePlaceholder">
          </div>

          <div class="form-group">
            <label for="email" data-i18n="formEmail">Email Address</label>
            <input type="email" id="email" required placeholder="example@mail.com" dir="ltr" style="text-align: left;">
          </div>

          <div class="form-group">
            <label for="message" data-i18n="formMessage">Your Message</label>
            <textarea id="message" rows="5" required placeholder="How can we help you?" data-i18n-placeholder="messagePlaceholder"></textarea>
          </div>

          <button type="submit" id="submitBtn" class="btn btn-primary btn-block mt-4" data-i18n="formSubmit">Send Message</button>
        </form>
      </div>

    </div>
  </main>

  <footer>
    <div class="footer-inner">
      <div data-i18n='footerRights'>&#169; 2026 Relizane Medical Directory. All rights reserved.</div>
      <div class='footer-links'>
        <a data-i18n='privacyPolicy' href='privacy.html'>Privacy Policy</a>
        <a data-i18n='termsOfUse' href='terms.html'>Terms of Use</a>
        <a data-i18n='contactUs' href='contact.html'>Contact Us</a>
      </div>
    </div>
  </footer>

  <script>
    const SUPABASE_URL = "https://iirjtmobphgmkgwkwumc.supabase.co/";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlpcmp0bW9icGhnbWtnd2t3dW1jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5NDA2NjYsImV4cCI6MjA5NjUxNjY2Nn0.Yfa0oEwp_id9tHpSb3h0jf__B4drqXsM-TVs4VTTmp4";


    document.getElementById('contactForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const submitBtn = document.getElementById('submitBtn');
      // حفظ النص الأصلي للزر لإعادته لاحقاً بغض النظر عن لغته الحالية
      const originalBtnText = submitBtn.innerText; 
      
      submitBtn.disabled = true;
      // يفضل إضافة مفتاح ترجمة لحالة "جاري الإرسال" في ملفات الترجمة لديك
      submitBtn.innerText = "..."; 

      const payload = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        message: document.getElementById('message').value
      };

      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/contact_messages`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Prefer': 'return=minimal'
          },
          body: JSON.stringify(payload)
        });

        if (response.ok) {
          // يمكن استبدال alert بنظام التنبيهات (Toast) الموجود في ملف CSS الخاص بك لدعم الترجمة
          alert('Message sent successfully! / تم إرسال الرسالة بنجاح!');
          document.getElementById('contactForm').reset();
        } else {
          throw new Error('Server response was not ok.');
        }

      } catch (error) {
        console.error('Error submitting form:', error);
        alert('An error occurred. Please try again. / حدث خطأ، يرجى المحاولة مرة أخرى.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.innerText = originalBtnText; // إعادة النص بلغته المختارة
      }
    });
  </script>

</body>
</html>
