<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="contactTitle">اتصل بنا - Relizane Medical Directory</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="app-container" style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
    <div style="width: 100%; max-width: 600px;">
      
      <div class="card card-hover">
        <div class="text-center mb-6">
          <h1 class="font-bold text-xl mb-2" style="color: var(--primary);" data-i18n="contactTitle">اتصل بنا</h1>
          <p class="text-gray text-sm" data-i18n="contactDesc">يسعدنا تواصلك معنا. يرجى ملء النموذج أدناه وسيتم حفظ رسالتك فوراً.</p>
        </div>

        <form id="contactForm">
          
          <div class="form-group">
            <label for="name" data-i18n="formName">الاسم الكامل</label>
            <input type="text" id="name" required placeholder="أدخل اسمك الكامل">
          </div>

          <div class="form-group">
            <label for="email" data-i18n="formEmail">البريد الإلكتروني</label>
            <input type="email" id="email" required placeholder="example@mail.com" dir="ltr" style="text-align: left;">
          </div>

          <div class="form-group">
            <label for="message" data-i18n="formMessage">رسالتك</label>
            <textarea id="message" rows="5" required placeholder="كيف يمكننا مساعدتك؟"></textarea>
          </div>

          <button type="submit" id="submitBtn" class="btn btn-primary btn-block mt-4" data-i18n="formSubmit">إرسال الرسالة</button>
        </form>
      </div>

    </div>
  </main>

  <footer>
    <div class="footer-inner">
      <div data-i18n='footerRights'>&#169; 2026 Relizane Medical Directory. All rights reserved.</div>
      <div class='footer-links'>
        <a data-i18n='privacyPolicy' href='privacy.html'>Privacy Policy</a>
        <a data-i18n='termsOfUse' href='terms.html'>Terms of Use</a>
        <a data-i18n='contactUs' href='contact.html'>Contact Us</a>
      </div>
    </div>
  </footer>

  <script>
    // تجميع ثوابت الـ API (استبدل هذه القيم ببيانات مشروعك الحقيقية من إعدادات Supabase)
    const SUPABASE_URL = "https://iirjtmobphgmkgwkwumc.supabase.co/";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlpcmp0bW9icGhnbWtnd2t3dW1jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5NDA2NjYsImV4cCI6MjA5NjUxNjY2Nn0.Yfa0oEwp_id9tHpSb3h0jf__B4drqXsM-TVs4VTTmp4";

    document.getElementById('contactForm').addEventListener('submit', async (e) => {
      e.preventDefault(); // منع الصفحة من إعادة التحميل الافتراضية
      
      const submitBtn = document.getElementById('submitBtn');
      
      // تغيير حالة الزر لمنع الضغط المتكرر (UX Best Practice)
      submitBtn.disabled = true;
      submitBtn.innerText = "جاري الإرسال...";

      // تجهيز البيانات المطابقة لأعمدة الجدول
      const payload = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        message: document.getElementById('message').value
      };

      try {
        // الاتصال المباشر بـ REST API الخاص بـ Supabase
        const response = await fetch(`${SUPABASE_URL}/rest/v1/contact_messages`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
            'Prefer': 'return=minimal' // يطلب من السيرفر عدم إعادة البيانات لتوفير الباندويث
          },
          body: JSON.stringify(payload)
        });

        if (response.ok) {
          alert('تم إرسال رسالتك وحفظها بنجاح! شكرًا لتواصلك معنا.');
          document.getElementById('contactForm').reset(); // تفريغ الحقول بعد النجاح
        } else {
          throw new Error('فشل السيرفر في الاستجابة بشكل صحيح');
        }

      } catch (error) {
        console.error('Error submitting form:', error);
        alert('عذرًا، حدث خطأ أثناء إرسال الرسالة. يرجى المحاولة مرة أخرى.');
      } finally {
        // إعادة الزر لوضعه الطبيعي
        submitBtn.disabled = false;
        submitBtn.innerText = "إرسال الرسالة";
      }
    });
  </script>

</body>
</html>
