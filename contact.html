<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="contactTitle">اتصل بنا - Relizane Medical Directory</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="app-container" style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
    
    <div style="width: 100%; max-width: 600px;">
      
      <div class="card text-center mb-6" style="background: var(--primary-light); border-color: var(--primary);">
        <p class="font-semibold mb-2" style="color: var(--primary-dark);" data-i18n="emailUs">يمكنك مراسلتنا مباشرة عبر البريد الإلكتروني:</p>
        <a href="mailto:contact.relizane@gmail.com" class="font-bold text-lg" style="color: var(--primary); text-decoration: none;" dir="ltr">
          contact.relizane@gmail.com
        </a>
      </div>

      <div class="card card-hover">
        <div class="text-center mb-6">
          <h1 class="font-bold text-xl mb-2" style="color: var(--primary);" data-i18n="contactTitle">اتصل بنا</h1>
          <p class="text-gray text-sm" data-i18n="contactDesc">يسعدنا تواصلك معنا. يرجى ملء النموذج أدناه وسيتم الرد عليك في أقرب وقت.</p>
        </div>

        <form action="YOUR_SERVICE_ENDPOINT" method="POST">
          
          <div class="form-group">
            <label for="name" data-i18n="formName">الاسم الكامل</label>
            <input type="text" id="name" name="name" required placeholder="أدخل اسمك الكامل">
          </div>

          <div class="form-group">
            <label for="email" data-i18n="formEmail">البريد الإلكتروني</label>
            <input type="email" id="email" name="email" required placeholder="example@mail.com" dir="ltr" style="text-align: left;">
          </div>

          <div class="form-group">
            <label for="message" data-i18n="formMessage">رسالتك</label>
            <textarea id="message" name="message" rows="5" required placeholder="كيف يمكننا مساعدتك؟"></textarea>
          </div>

          <button type="submit" class="btn btn-primary btn-block mt-4" data-i18n="formSubmit">إرسال الرسالة</button>
        </form>
      </div>

    </div>
  </main>

  <footer>
    <div class="footer-inner">
      <div data-i18n='footerRights'>&#169; 2026 Relizane Medical Directory. All rights reserved.</div>
      <div class='footer-links'>
        <a data-i18n='privacyPolicy' href='privacy.html'>Privacy Policy</a>
        <a data-i18n='termsOfUse' href='terms.html'>Terms of Use</a>
        <a data-i18n='contactUs' href='contact.html'>Contact Us</a>
      </div>
    </div>
  </footer>

</body>
</html>
