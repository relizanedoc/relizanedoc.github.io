<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="contactPageTitle">اتصل بنا - Relizane Medical Directory</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav>
    <div class="nav-inner">
      <div class="logo">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
        Relizane Medical
      </div>
      
      <div class="nav-links">
        <a href="index.html" class="nav-btn" data-i18n="navDirectory" style="text-decoration:none;">الرئيسية</a>
        <a href="track.html" class="nav-btn" data-i18n="navTrack" style="text-decoration:none;">تتبع الحجز</a>
        <a href="add-doctor.html" class="nav-btn" data-i18n="navAddDoctor" style="text-decoration:none;">إضافة طبيب</a>
        <a href="doctor-login.html" class="nav-btn" data-i18n="navDoctorLogin" style="text-decoration:none;">دخول الأطباء</a>
        <a href="login.html" class="nav-btn" data-i18n="navLogin" style="text-decoration:none;">تسجيل الدخول</a>
      </div>

      <div class="right-nav-controls">
        <div class="lang-switch">
          <button class="lang-btn" id="btn-en">EN</button>
          <button class="lang-btn active" id="btn-ar">عربي</button>
        </div>
      </div>
    </div>
  </nav>

  <main class="app-container" style="display: flex; justify-content: center; align-items: center; min-height: 80vh;">
    <div style="width: 100%; max-width: 600px;">
      
      <div class="card card-hover">
        <div class="text-center mb-6">
          <h1 class="font-bold text-xl mb-2" style="color: var(--primary);" data-i18n="contactTitle">اتصل بنا</h1>
          <p class="text-gray text-sm" data-i18n="contactDesc">يسعدنا تواصلك معنا. يرجى ملء النموذج أدناه وسيتم حفظ رسالتك فوراً.</p>
        </div>

        <form id="contactForm">
          
          <input type="text" id="websiteUrl" name="websiteUrl" style="display:none" tabindex="-1" autocomplete="off">

          <div class="form-group">
            <label for="name" data-i18n="formName">الاسم الكامل</label>
            <input type="text" id="name" required placeholder="أدخل اسمك الكامل" data-i18n-placeholder="namePlaceholder">
          </div>

          <div class="form-group">
            <label for="email" data-i18n="formEmail">البريد الإلكتروني</label>
            <input type="email" id="email" required placeholder="example@mail.com" dir="ltr" style="text-align: left;">
          </div>

          <div class="form-group">
            <label for="message" data-i18n="formMessage">رسالتك</label>
            <textarea id="message" rows="5" required minlength="10" placeholder="كيف يمكننا مساعدتك؟" data-i18n-placeholder="messagePlaceholder"></textarea>
          </div>

          <div class="form-group" style="background: var(--bg); padding: 15px; border-radius: 8px; border: 1px dashed var(--border);">
            <label id="captchaQuestion" style="color: var(--primary-dark); font-weight: bold;"></label>
            <input type="number" id="captchaAnswer" required placeholder="..." style="width: 50%; margin-top: 5px;">
          </div>

          <button type="submit" id="submitBtn" class="btn btn-primary btn-block mt-4" data-i18n="formSubmit">إرسال الرسالة</button>
        </form>
      </div>

    </div>
  </main>

  <footer>
    <div class="footer-inner">
      <div data-i18n='footerRights'>&#169; 2026 Relizane Medical Directory. All rights reserved.</div>
      <div class='footer-links'>
        <a data-i18n='privacyPolicy' href='privacy.html'>Privacy Policy</a>
        <a data-i18n='termsOfUse' href='terms.html'>Terms of Use</a>
        <a data-i18n='contactUs' href='contact.html'>اتصل بنا</a>
      </div>
    </div>
  </footer>

  <div id="toastContainer"></div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      
      /* =========================================================
         1. إعدادات الكابتشا والنظام المنبثق الجميل (Toasts)
         ========================================================= */
      let num1, num2, expectedAnswer;
      const captchaQuestionEl = document.getElementById('captchaQuestion');
      
      function generateCaptcha() {
        if (!captchaQuestionEl) return;
        num1 = Math.floor(Math.random() * 10) + 1;
        num2 = Math.floor(Math.random() * 10) + 1;
        expectedAnswer = num1 + num2;
        const lang = document.documentElement.lang || 'ar';
        captchaQuestionEl.innerText = lang === 'ar' ? `تحقق أمني: كم يساوي ${num1} + ${num2} ؟` : `Security Check: What is ${num1} + ${num2}?`;
      }

      // الدالة الجديدة التي تستخدم تصميم موقعك بدلاً من المربع القبيح أعلى الكود
      function showAlert(message, isError = true) {
        const container = document.getElementById('toastContainer');
        if (!container) return;
        
        const toast = document.createElement('div');
        toast.className = `toast ${isError ? 'error' : 'success'}`;
        toast.innerText = message;
        
        container.appendChild(toast);
        
        // حذف التنبيه برفق بعد 4 ثوانٍ
        setTimeout(() => {
          toast.style.animation = 'fadeOutDown 0.35s forwards';
          setTimeout(() => toast.remove(), 350);
        }, 4000);
      }

      /* =========================================================
         2. نظام تبديل اللغات (Arabic / English)
         ========================================================= */
      const translations = {
        en: {
          contactPageTitle: "Contact Us - Relizane Medical Directory",
          navDirectory: "Directory", navTrack: "Track Booking", navAddDoctor: "Add Doctor", navDoctorLogin: "Doctor Login", navLogin: "Login",
          contactTitle: "Contact Us",
          contactDesc: "We'd love to hear from you. Please fill out the form below.",
          formName: "Full Name", namePlaceholder: "Enter your full name",
          formEmail: "Email Address",
          formMessage: "Your Message", messagePlaceholder: "How can we help you?",
          formSubmit: "Send Message",
          footerRights: "© 2026 Relizane Medical Directory. All rights reserved.",
          privacyPolicy: "Privacy Policy", termsOfUse: "Terms of Use", contactUs: "Contact Us"
        },
        ar: {
          contactPageTitle: "اتصل بنا - Relizane Medical Directory",
          navDirectory: "الرئيسية", navTrack: "تتبع الحجز", navAddDoctor: "إضافة طبيب", navDoctorLogin: "دخول الأطباء", navLogin: "تسجيل الدخول",
          contactTitle: "اتصل بنا",
          contactDesc: "يسعدنا تواصلك معنا. يرجى ملء النموذج أدناه وسيتم حفظ رسالتك فوراً.",
          formName: "الاسم الكامل", namePlaceholder: "أدخل اسمك الكامل",
          formEmail: "البريد الإلكتروني",
          formMessage: "رسالتك", messagePlaceholder: "كيف يمكننا مساعدتك؟",
          formSubmit: "إرسال الرسالة",
          footerRights: "© 2026 الدليل الطبي لغليزان. جميع الحقوق محفوظة.",
          privacyPolicy: "سياسة الخصوصية", termsOfUse: "شروط الاستخدام", contactUs: "اتصل بنا"
        }
      };

      function setLanguage(lang) {
        document.documentElement.lang = lang;
        document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';

        const btnAr = document.getElementById('btn-ar');
        const btnEn = document.getElementById('btn-en');
        if (btnAr) btnAr.classList.toggle('active', lang === 'ar');
        if (btnEn) btnEn.classList.toggle('active', lang === 'en');

        document.querySelectorAll('[data-i18n]').forEach(el => {
          const key = el.getAttribute('data-i18n');
          if (translations[lang] && translations[lang][key]) {
            el.innerText = translations[lang][key];
          }
        });

        document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
          const key = el.getAttribute('data-i18n-placeholder');
          if (translations[lang] && translations[lang][key]) {
            el.placeholder = translations[lang][key];
          }
        });

        localStorage.setItem('siteLang', lang);
        generateCaptcha(); 
      }

      const btnAr = document.getElementById('btn-ar');
      const btnEn = document.getElementById('btn-en');
      if (btnAr) btnAr.addEventListener('click', () => setLanguage('ar'));
      if (btnEn) btnEn.addEventListener('click', () => setLanguage('en'));
      
      const currentLang = localStorage.getItem('siteLang') || 'ar';
      setLanguage(currentLang);

      /* =========================================================
         3. الربط بـ Supabase ومعالجة الإرسال
         ========================================================= */
      const SUPABASE_URL = "https://iirjtmobphgmkgwkwumc.supabase.co";
      const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlpcmp0bW9icGhnbWtnd2t3dW1jIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5NDA2NjYsImV4cCI6MjA5NjUxNjY2Nn0.Yfa0oEwp_id9tHpSb3h0jf__B4drqXsM-TVs4VTTmp4";
      
      const contactForm = document.getElementById('contactForm');
      
      if (contactForm) {
        contactForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const lang = document.documentElement.lang;

          // أ. فحص مصيدة الروبوتات
          const websiteUrl = document.getElementById('websiteUrl');
          if (websiteUrl && websiteUrl.value !== "") return;

          // ب. فحص الكابتشا
          const captchaAnswer = document.getElementById('captchaAnswer');
          if (!captchaAnswer || parseInt(captchaAnswer.value) !== expectedAnswer) {
            showAlert(lang === 'ar' ? 'الإجابة الرياضية خاطئة، يرجى المحاولة مرة أخرى.' : 'Incorrect math answer. Please try again.');
            generateCaptcha();
            return;
          }

          // ج. فحص حظر الـ 10 دقائق
          const lastSentTime = localStorage.getItem('lastMessageTime');
          if (lastSentTime) {
            const timeElapsed = Date.now() - parseInt(lastSentTime);
            const tenMinutes = 10 * 60 * 1000;
            if (timeElapsed < tenMinutes) {
              const minutesLeft = Math.ceil((tenMinutes - timeElapsed) / 60000);
              showAlert(lang === 'ar' ? `لقد قمت بإرسال رسالة مؤخراً. يرجى الانتظار ${minutesLeft} دقائق.` : `You recently sent a message. Please wait ${minutesLeft} minutes.`);
              return;
            }
          }

          // د. إرسال البيانات
          const submitBtn = document.getElementById('submitBtn');
          const originalBtnText = submitBtn.innerText;
          submitBtn.disabled = true;
          submitBtn.innerText = lang === 'ar' ? "جاري الإرسال..." : "Sending...";

          const payload = {
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            message: document.getElementById('message').value
          };

          try {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/contact_messages`, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'apikey': SUPABASE_ANON_KEY,
                'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                'Prefer': 'return=minimal'
              },
              body: JSON.stringify(payload)
            });

            if (response.ok) {
              showAlert(lang === 'ar' ? 'تم إرسال رسالتك بنجاح!' : 'Message sent successfully!', false);
              contactForm.reset();
              generateCaptcha();
              localStorage.setItem('lastMessageTime', Date.now());
            } else {
              const errorData = await response.json();
              if (errorData.message && errorData.message.includes('RATE_LIMIT_EXCEEDED')) {
                showAlert(lang === 'ar' ? 'لقد تجاوزت الحد المسموح. يرجى الانتظار 10 دقائق.' : 'Rate limit exceeded. Wait 10 minutes.');
              } else {
                throw new Error('Server error');
              }
            }

          } catch (error) {
            showAlert(lang === 'ar' ? 'حدث خطأ في الاتصال، يرجى المحاولة لاحقاً.' : 'Connection error, please try again.');
          } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = originalBtnText;
          }
        });
      }
    });
  </script>

</body>
</html>
